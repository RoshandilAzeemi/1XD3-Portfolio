<!DOCTYPE html>
<!--
To be used in exercises. 

NOTE ON ABSOLUTE POSITIONING: When an element has position:absolute, you can place 
anywhere on the page you want. You can specify a pixel position of the top, left
corner using the top and left CSS properties. If the element is a child of
<body> this will position it relative to the top left corner of the page.

If an element with absolute position is inside another element with absolute
position (as the "moveme" div is below) you specify top and left to move it 
relative to the top left corner of the containing element. So for this element,
top: 0px and left: 0px puts it in the top left corner of the "container" div.

-->
<html>
    <head>
        <title>Move Za Circle</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            #container {
                position:absolute;
                top:50px;
                left:50px;
                width:500px;
                height:500px;
                border: 10px solid black;
                border-radius: 70px;
            }
            #moveme {
                position: absolute;
                top: 0px;
                left: 0px;
                width: 100px;
                height: 100px;
                background-color: green;
                border-radius:100px;
                border:10px solid black;
            }
        </style>

        <script>
            let currentLeft = 0;
            let currentTop = 0;
            const stepSize = 20;

            function moveCircle() {
                if (confirm("Move the circle to a random position?")) {
                    const randLeft = Math.floor(Math.random() * (381));
                    const randTop = Math.floor(Math.random() * (381));

                    const element = document.getElementById('moveme');
                    element.style.left = randLeft + "px";
                    element.style.top = randTop + "px";
                    currentLeft = randLeft;
                    currentTop = randTop;
                    
                    console.log(`Random move to: ${currentLeft}, ${currentTop}`);
                }
            }

            function moveDirection() {
                const input = prompt("Please enter direction: U (Up), D (Down), L (Left), R (Right), or Q (Quit)");
                
                if (!input) return;

                const dir = input.toUpperCase();
                let nextLeft = currentLeft;
                let nextTop = currentTop;

                switch(dir) {
                    case 'U': nextTop -= stepSize; break;
                    case 'D': nextTop += stepSize; break;
                    case 'L': nextLeft -= stepSize; break;
                    case 'R': nextLeft += stepSize; break;
                    case 'Q': console.log("I quit, BYE"); return;
                    default: 
                        alert("Invalid command. Use U, D, L, R, or Q.");
                        return;
                }

                if (nextLeft < 0 || nextLeft > 380 || nextTop < 0 || nextTop > 380) {
                    alert("Out of bounds! Movement cancelled.");
                } else {
                    currentLeft = nextLeft;
                    currentTop = nextTop;

                    const element = document.getElementById('moveme');
                    element.style.left = currentLeft + "px";
                    element.style.top = currentTop + "px";
                    
                    console.log(`Moved ${dir}. Position: ${currentLeft}, ${currentTop}`);
                }
            }
            
            console.log("Welcome. Type moveCircle() or moveDirection() in the console to start.");
        </script>
    </head>
    <body>
        <div id="container">
            <div id='moveme'></div>
        </div>
    </body>
</html>
